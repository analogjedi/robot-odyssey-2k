<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Odyssey 2K</title>
  <meta name="description" content="A modern browser reimagining of Robot Odyssey: climb inside humanoid robots, wire logic circuits, burn custom chips, and escape the megafab.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='5' y='8' width='22' height='19' rx='4' fill='%23111a2e' stroke='%2322d3ee' stroke-width='2'/%3E%3Crect x='10' y='14' width='4' height='4' fill='%2322d3ee'/%3E%3Crect x='18' y='14' width='4' height='4' fill='%2322d3ee'/%3E%3Crect x='11' y='21' width='10' height='2' fill='%234ade80'/%3E%3Cline x1='16' y1='8' x2='16' y2='3' stroke='%234ade80' stroke-width='2'/%3E%3Ccircle cx='16' cy='3' r='2' fill='%234ade80'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="640"></canvas>

    <div id="menu" class="overlay hidden">
      <h1>ROBOT ODYSSEY <span>2K</span></h1>
      <p class="tag">escape the megafab · one logic gate at a time</p>
      <div class="menu-btns">
        <button id="btn-new">▸ New game</button>
        <button id="btn-continue" class="hidden">▸ Continue</button>
        <button id="btn-sandbox">▸ Innovation lab (sandbox)</button>
        <button id="btn-howto">▸ How to play</button>
        <button id="btn-codex">▸ Engineer's codex</button>
      </div>
      <p class="credit">a modern tribute to Robot Odyssey (1984) — wire sensors to motors,
        burn your own chips, teach humanoid robots to think</p>
    </div>

    <div id="modal" class="overlay hidden"><div id="modal-content"></div></div>
    <div id="inspector" class="hidden"></div>
    <div id="toast"></div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
